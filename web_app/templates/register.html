{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 mt-5">
            <h3 class="text-center mb-4">Създай профил</h3>
            <form method="POST" action="/register">
                <div class="mb-3">
                    <label class="form-label">Потребителско име</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Парола</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Регистрация</button>
            </form>
            <p class="text-center mt-3">Вече имаш профил? <a href="/login">Влез тук</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
