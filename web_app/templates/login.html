{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 shadow">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-lock fs-1 text-primary mb-3"></i>
                <h3 class="fw-bold">Вход в системата</h3>
            </div>
            <form method="POST" action="/login">
                <div class="mb-3">
                    <label class="form-label text-muted small text-uppercase">Потребителско име</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="admin" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small text-uppercase">Парола</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Влез в акаунта</button>
            </form>
            <p class="text-center mt-4 mb-0 text-muted">Нямаш профил? <a href="/register" class="text-primary text-decoration-none">Регистрирай се</a></p>
        </div>
    </div>
</div>
{% endblock %}
